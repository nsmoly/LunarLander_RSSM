# Configuration file for Dreamer training parameters
world_model:
  capacity:
    latent_dim: 64
    hidden_dim: 128
  loss_weights:
    reconstruction: 1.0
    reward: 1.0
    kl: 1.0
  epochs: 200
  val_freq: 10
  lr: 0.0001
  beta_kl: 0.5
  batch_size: 64
  checkpoint_freq: 10  # Save checkpoint every 100 epochs
  
actor_critic:
  capacity:
    latent_dim: 64
    hidden_dim: 128
  loss_weights:
    actor: 1.0
    critic: 1.0
    entropy: 0.1
  auxiliary_rewards:
    upright_pose_weight: 0.01    # Reward for being upright (angle close to 0)
    downward_speed_weight: 0.005 # Penalty for downward velocity
  epochs: 200
  lr: 0.0001
  imagination_horizon: 50
  batch_size: 64
  checkpoint_freq: 10  # Save checkpoint every 10 epochs
  
