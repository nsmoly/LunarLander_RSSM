# Configuration file for Dreamer training parameters
world_model:
  action_dim: 4
  capacity:
    latent_dim: 64
    hidden_dim: 384
    gru_num_layers: 1  # Number of stacked GRU layers in RSSM
  loss_weights:
    reconstruction: 1.0
    reward: 1.2
    kl: 1.0
    done: 0.5
  epochs: 200
  val_freq: 10
  lr: 0.0001
  beta_kl: 0.5
  batch_size: 64
  sequence_length: 30
  checkpoint_freq: 10  # Save checkpoint every 100 epochs
  
actor_critic:
  action_dim: 4
  # Horizon: past_horizon (warm-up) + future_horizon (imagination) = horizon. Must satisfy P+F=H.
  horizon: 20
  past_horizon: 5    # P: warm-up steps with real (obs, action)
  future_horizon: 15  # F: imagination rollout steps
  lambda_gae: 0.95   # GAE lambda: 0=1-step TD, 1=full returns, 0.95=typical hybrid
  capacity:
    latent_dim: 64
    hidden_dim: 384
    gru_num_layers: 1  # Must match world_model capacity for loading world_model.pt
  loss_weights:
    actor: 1.0
    critic: 0.3
    entropy: 0.5   # Entropy start (early exploration)
    entropy_final: 0.35   # Slightly higher late exploration to reduce passive falling
  advantage_clip: 0.9   # Slightly tighter actor update magnitude
  actor_grad_clip: 1.8 # Slightly tighter actor gradient clipping
  collapse_entropy_threshold: 0.35   # Stop earlier when entropy gets too low
  collapse_actor_grad_threshold: 0.002  # Stop earlier if actor gradients fade
  collapse_max_action_prob_threshold: 0.96  # Detect near-single-action policy earlier
  collapse_patience_epochs: 2  # Fewer bad epochs before stop
  low_entropy_actor_lr_threshold: 0.80  # Delay LR drop to avoid early policy passivity
  reduced_actor_lr: 0.000008  # One-way LR drop before full collapse
  epochs: 230
  lr: 0.000010   # Lower base LR for better late-epoch stability
  batch_size: 64
  checkpoint_freq: 10  # Save checkpoint every 10 epochs
  
